<section id="contact" class="contact">
  <h2 class="section-title">Let's <span>Talk</span></h2>
  <div class="divider"></div>

  <div class="contact__inner">
    <p class="contact__desc">
      Open to remote opportunities in the US and globally.<br>
      Building with AI — not just talking about it.
    </p>

    <div class="contact__links">
      <button mat-stroked-button class="contact__btn" (click)="copyEmail()">
        <mat-icon>{{ emailCopied ? 'check' : 'email' }}</mat-icon>
        {{ emailCopied ? 'Copied!' : 'Email' }}
      </button>

      <a *ngFor="let link of links" [href]="link.href" target="_blank" rel="noopener" mat-stroked-button
        class="contact__btn">
        <mat-icon>{{ link.icon }}</mat-icon> {{ link.label }}
      </a>
    </div>
  </div>
</section>
